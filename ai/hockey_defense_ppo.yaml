behaviors:
  HockeyDefense:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    checkpoint_interval: 60000
    keep_checkpoints: 10
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 10000

env_settings:
  num_envs: 1
  num_areas: 1
  timeout_wait: 60

engine_settings:
  width: 1280
  height: 720
  quality_level: 1
  time_scale: 20
  target_frame_rate: -1
  capture_frame_rate: 60
